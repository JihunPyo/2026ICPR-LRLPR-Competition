seed: 1996

data:
  root: ./data
  val_ratio: 0.1
  scenario_filter: null
  layout_filter: null

preprocess:
  input_mode: stack15
  imgW: 48
  imgH: 16
  aug: true
  image_aspect_ratio: 3
  background: (127, 127, 127)

model:
  name: cgnetV2_deformable
  args:
    in_channels: 15
    out_channels: 3
  checkpoint: null

loss:
  mode: hybrid
  l1_weight: 1.0
  ssim_weight: 0.25
  ssim_window: 5

train:
  epochs: 40
  batch_size: 32
  val_batch_size: 32
  num_workers: 8
  lr: 1.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.0
  lr_step: 10
  lr_gamma: 0.5
  amp: true
  update_mode: avg5_once   # options: avg5_once, per_hr_step
  resume: null
  save_dir: ./save/mf5_15ch
  early_stop:
    enabled: true
    patience: 8
    min_delta: 1.0e-4
    min_epochs: 10
    monitor: val_loss

wandb:
  enabled: true
  project: lpr-mf5
  entity: pyojihun80-kyung-hee-university
  run_name: null
  mode: online   # online | offline | disabled
  dir: null
