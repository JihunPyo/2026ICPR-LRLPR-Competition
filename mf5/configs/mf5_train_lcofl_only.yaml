seed: 1996

data:
  root: ./data
  val_ratio: 0.1
  scenario_filter: null
  layout_filter: null

preprocess:
  input_mode: stack15
  imgW: 48
  imgH: 16
  aug: true
  image_aspect_ratio: 3
  background: (127, 127, 127)

model:
  name: cgnetV2_deformable
  args:
    in_channels: 15
    out_channels: 3
  checkpoint: /data/pjh7639/weights/LCDNet/runs/lcdnet_2stage_exp01/stage2/best_model_cgnetV2_deformable_Epoch_8.pth

loss:
  mode: lcofl_only
  lcofl_weight: 1.0
  lcofl:
    ce_weight: 1.0
    ssim_weight: 0.75
    layout_weight: 0.2
    ssim_window: 5
  confusion_matrix:
    enabled: true
    threshold: 0.25
    pair_weight: 0.5
  # Kept for backward compatibility; ignored in loss.mode=lcofl_only.
  l1_weight: 1.0
  ssim_weight: 0.25
  ssim_window: 5
  pixel_weight: 1.0

ocr:
  ocr_ckpt: /data/pjh7639/weights/GP_LPR/gplpr_2stage_66324_20260220_033315_best_stage2.pth
  ocr_train: false
  layout_alpha: 1.0
  alphabet: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
  nc: 3
  k: 7
  is_seq_model: true
  head: 2
  inner: 256
  is_l2_norm: true

adv:
  enabled: false

train:
  epochs: 40
  batch_size: 32
  val_batch_size: 32
  num_workers: 8
  lr: 1.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.0
  lr_step: 10
  lr_gamma: 0.5
  amp: true
  update_mode: avg5_once
  resume: null
  save_dir: ./save/mf5_15ch_lcofl_only
  early_stop:
    enabled: true
    patience: 8
    min_delta: 1.0e-4
    min_epochs: 10
    monitor: val_loss
  val_ocr:
    enabled: true
    every_n_epochs: 1
    scope: full_val
    batch_size: null
    num_workers: 8
    save_per_sample: false
    output_subdir: val_ocr

wandb:
  enabled: true
  project: lpr-mf5
  entity: pyojihun80-kyung-hee-university
  run_name: mf5-15ch-lcofl-only
  mode: online
  dir: null
